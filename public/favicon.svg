<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2540;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0057FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0057FF;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bgGrad)" />

  <!-- Subtle glow top-left -->
  <ellipse cx="6" cy="6" rx="10" ry="10" fill="url(#glowGrad)" />

  <!-- Letter P — bold, clean -->
  <text
    x="4"
    y="23"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="20"
    font-weight="700"
    fill="url(#accentGrad)"
    filter="url(#glow)"
    letter-spacing="-1"
  >P</text>

  <!-- Digital dot accent — bottom right -->
  <circle cx="26" cy="26" r="2.5" fill="url(#accentGrad)" opacity="0.9" />
  <circle cx="26" cy="26" r="1.2" fill="#00C6FF" />

  <!-- Thin horizontal line for "digital" feel -->
  <line x1="4" y1="26" x2="20" y2="26" stroke="url(#accentGrad)" stroke-width="1" stroke-linecap="round" opacity="0.5" />
</svg>
